<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BD Nakht - Digital Polychrome Palaeography Demo</title>
  <style>
    body { margin:0; padding:0; background:#222; font-family:Arial, sans-serif; }
    #mirador { width:100vw; height:100vh; }
    h1 { position:absolute; top:10px; left:20px; color:white; z-index:10; background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:4px; }
  </style>
</head>
<body>
  <h1>Book of the Dead of Nakht (BM EA 10473) — Sheet 1</h1>
  
  <div id="mirador"></div>

  <script src="https://unpkg.com/mirador@3/dist/mirador.min.js"></script>
  <script>
    const miradorInstance = Mirador.viewer({
      id: 'mirador',
      window: {
        defaultView: 'single',
        views: [{ key: 'single' }]
      },
      windows: [{
        id: 'main-window',
        manifestId: 'https://msrtx.github.io/BD_Nakht_a/manifests/BD_Nakht_a.json',
        canvasIndex: 0,
        thumbnailNavigationPosition: 'far-bottom'
      }]
    });
  </script>
</body>
</html>
